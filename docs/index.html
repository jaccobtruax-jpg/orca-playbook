<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrcaRouter 20-Account Outreach Playbook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a2e; --border: #2a2a44; --text: #e8e8f0; --muted: #8888aa; --accent: #00d4aa; --red: #ef4444; --orange: #f59e0b; --blue: #3b82f6; --green: #10b981; }
body { font-family: Inter, sans-serif; background: var(--bg); color: var(--text); }
.hero { text-align: center; padding: 40px 20px 32px; border-bottom: 1px solid var(--border); }
.hero h1 { font-size: 32px; font-weight: 800; }
.hero h1 span { color: var(--accent); }
.hero p { color: var(--muted); font-size: 14px; margin-top: 6px; }
.hero-metrics { display: flex; justify-content: center; gap: 10px; margin-top: 16px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 13px; }
.container { max-width: 1360px; margin: 0 auto; padding: 0 16px; }
.controls { display: flex; gap: 8px; overflow-x: auto; padding: 16px 0; position: sticky; top: 0; z-index: 50; background: var(--bg); }
.controls button { flex-shrink: 0; padding: 8px 18px; border-radius: 8px; border: 1px solid transparent; background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; }
.controls button:hover { border-color: var(--border); color: var(--text); }
.controls button.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
.section { display: none; padding: 20px 0 40px; }
.section.active { display: block; }
h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
.acct-row { display: grid; grid-template-columns: 1fr 80px 80px 90px; gap: 6px; align-items: start; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; cursor: pointer; }
.acct-row:hover { border-color: rgba(255,255,255,0.1); }
.acct-row.open { border-color: var(--accent); }
.acct-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 100px; }
.tag-hot { background: rgba(239,68,68,0.15); color: var(--red); }
.tag-warm { background: rgba(245,158,11,0.15); color: var(--orange); }
.tag-cold { background: rgba(59,130,246,0.15); color: var(--blue); }
.acct-name { font-size: 14px; font-weight: 600; }
.acct-cluster { font-size: 10px; color: var(--muted); }
.acct-angle { font-size: 11px; color: var(--accent); font-weight: 500; }
.acct-detail { display: none; grid-column: 1 / -1; padding: 16px 0 8px; border-top: 1px solid var(--border); margin-top: 8px; }
.acct-row.open .acct-detail { display: block; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.detail-card { background: var(--surface2); border-radius: 8px; padding: 14px; }
.detail-card h4 { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
.detail-card p, .detail-card li { font-size: 12.5px; color: var(--muted); line-height: 1.6; list-style: none; }
.trk-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 10px; }
.trk-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.trk-card .meta { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
.trk-card .field-group { margin-bottom: 8px; }
.trk-card label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 3px; }
.trk-card select, .trk-card textarea, .trk-card input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 12px; }
.trk-card textarea { min-height: 44px; resize: vertical; }
.trk-card .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
.dash-card .dash-num { font-size: 28px; font-weight: 700; color: var(--accent); }
.dash-card .dash-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
.actions-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.actions-table th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600; color: var(--muted); border-bottom: 1px solid var(--border); }
.actions-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.todo { background: var(--muted); }
.status-dot.emailed { background: var(--blue); }
.status-dot.called { background: var(--green); }
.status-dot.meeting-scheduled { background: var(--orange); }
.status-dot.meeting-done { background: var(--accent); }
.status-dot.declined { background: var(--red); }
.status-dot.closed { background: var(--green); }
.btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; color: var(--text); font-size: 12px; cursor: pointer; }
.btn:hover { border-color: var(--accent); }
.footer { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<div class="hero">
  <h1>OrcaRouter <span>Outreach Playbook</span></h1>
  <p>20 accounts - Track contacts, messages and LinkedIn</p>
  <div class="hero-metrics">
    <span class="metric">8 Hot</span>
    <span class="metric">10 Warm</span>
    <span class="metric">2 Cold</span>
  </div>
</div>

<div class="container">
<div class="controls">
  <button class="active">Accounts</button>
  <button onclick="switchTab('tracker')">Tracker</button>
  <button onclick="switchTab('actions')">Actions</button>
  <button onclick="switchTab('prospects')">Prospects</button>
  <button onclick="switchTab('messaging')">Messaging</button>
</div>

<div id="tab-accounts" class="section active">
  <div id="accountsRoot"></div>
</div>
<div id="tab-tracker" class="section">
  <h2>Tracker and Contacts</h2>
  <div id="trackerRoot"></div>
</div>
<div id="tab-actions" class="section">
  <h2>Actions</h2>
  <div id="actionsRoot"></div>
</div>
<div id="tab-prospects" class="section">
  <h2>Prospect Signals</h2>
  <div id="prospectsRoot"></div>
</div>
<div id="tab-messaging" class="section">
  <h2>Messaging Assistant</h2>
  <p style="color:var(--muted);font-size:13px">Coming soon</p>
</div>
</div>

<div class="footer">OrcaRouter Outreach Playbook - FlashLabs - July 2026</div>

<script>
var DATA = [
{id:'replit',name:'Replit',cl:'C1: Code',prio:'hot',wk:'W1',tch:'Call+Email',angle:'Claude single-provider to fallback',targets:'VP Eng, Head of AI Platform, CTO',signal:'9 AI/ML roles open. Agent 4 uses Claude Sonnet 4.5 exclusively.',msg:'Replit Agent runs on Claude exclusively. When Claude degrades, every session breaks. OrcaRouter adds invisible fallback chains.',notes:'Highest urgency'},
{id:'sourcegraph',name:'Sourcegraph',cl:'C1: Code',prio:'hot',wk:'W1',tch:'Email to Call',angle:'Tool-call firewall for Cody',targets:'Head of Product Cody, CTO, VP Eng',signal:'Pure enterprise ($59/seat, SOC2). BYO model on Enterprise tier.',msg:'Cody runs multi-model with code-exec tool access. OrcaRouter tool-call firewall blocks secrets before they hit the LLM.',notes:'Reference their published blog content'},
{id:'notion',name:'Notion',cl:'C2: Enterprise AI',prio:'hot',wk:'W2',tch:'Call to Email',angle:'June 7 outage - manual failover',targets:'Head of AI, VP Eng, CTO',signal:'June 7: Opus 4.7 degraded. Notion manually disabled ALL Claude models.',msg:'June 7 - you manually disabled every Claude model. Next time OrcaRouter auto-fails over before users notice.',notes:'Freshest pain on the list'},
{id:'box',name:'Box',cl:'C2: Enterprise AI',prio:'hot',wk:'W1',tch:'Email to Call',angle:'HIPAA and PII Shield for Box AI',targets:'VP Product AI, CISO, CTO',signal:'Box AI processes documents with PHI/PII. Claude enterprise customer.',msg:'PHI hitting the LLM is a compliance event. PII Shield scans every prompt - blocks, redacts, logs.',notes:'Lead with compliance'},
{id:'intercom',name:'Intercom',cl:'C2: Enterprise AI',prio:'hot',wk:'W1',tch:'Call to Email',angle:'Cost optimization for Fin and PII',targets:'VP AI/ML, CTO, Head of Fin',signal:'6,000+ customers. $0.99/resolution. Every resolution is expensive tokens.',msg:'Route simple tickets to Haiku/GPT-4o-mini - save 40-60% on inference. PII Shield keeps it safe.',notes:'Lead with cost savings'},
{id:'cursor',name:'Cursor',cl:'C1: Code',prio:'hot',wk:'W2',tch:'Email',angle:'PII leak risk and Claude fallback',targets:'CTO, VP Eng',signal:'Claude enterprise customer. File system access equals PII leak risk.',msg:'Cursor access to local files equals PII leak risk. OrcaRouter tool-call firewall blocks secrets.',notes:'Same play as Replit'},
{id:'gitlab',name:'GitLab',cl:'C2: Enterprise AI',prio:'hot',wk:'W2',tch:'Email',angle:'Secrets in code prompts and SOC2',targets:'VP Product AI, CTO, Head of Duo',signal:'Own AI Gateway and Vertex AI. Secrets Manager in beta.',msg:'Enterprise code equals secrets in prompts. OrcaRouter guardrails block secrets before they hit the model.',notes:'SOC2 recipe play'},
{id:'codeium',name:'Codeium',cl:'C1: Code',prio:'warm',wk:'W2',tch:'Email',angle:'Zero-markup for high-volume API',targets:'CEO, CTO, Head of Engineering',signal:'Millions of calls/day. Uses own small model and frontier APIs.',msg:'Every marked-up API call is lost margin. OrcaRouter passes through at provider cost. No markup.',notes:'Clear cost play'},
{id:'databricks',name:'Databricks',cl:'C4: Infra',prio:'warm',wk:'W2',tch:'Email to LinkedIn',angle:'Zero-markup for customer models',targets:'VP AI/ML, GM AI Products, Head of Mosaic AI',signal:'Serves thousands through Mosaic AI Gateway. Massive inference volume.',msg:'Your customers pay marked-up inference. OrcaRouter gives zero-markup under your management.',notes:'Complement Mosaic AI'},
{id:'hashicorp',name:'HashiCorp',cl:'C4: Infra',prio:'warm',wk:'W2',tch:'Email',angle:'Tool-call governance for IaC',targets:'CTO, VP Product, Head of AI',signal:'IaC generation equals terraform apply is a tool call that can destroy infra.',msg:'IaC generation is powerful until a hallucinated apply destroys infra. OrcaRouter firewall reviews every call.',notes:'Firewall non-negotiable'},
{id:'temporal',name:'Temporal',cl:'C4: Infra',prio:'warm',wk:'W3',tch:'Email to Call',angle:'Durability plus routing',targets:'CTO, Head of Product, VP Eng',signal:'Agents need reliable model access. Temporal equals durability. OrcaRouter equals routing.',msg:'You handle durability. We handle model availability plus cost. Together: agents that never fail.',notes:'Clear complement'},
{id:'grafana',name:'Grafana',cl:'C4: Infra',prio:'warm',wk:'W3',tch:'Email',angle:'PII in query logs',targets:'VP Product, CTO, Head of AI',signal:'PII in logs is known. Sift AI product live.',msg:'Observability data to LLMs equals PII in prompts. OrcaRouter PII Shield blocks it before the model.',notes:'Natural integration'},
{id:'confluent',name:'Confluent',cl:'C4: Infra',prio:'warm',wk:'W3',tch:'Email',angle:'Guardrails for Kafka to LLM',targets:'VP Product AI, CTO, Head of AI/ML',signal:'Kafka-scale streaming. AI features on streaming data.',msg:'Streaming data to LLM equals PII at scale. OrcaRouter adds guardrails between pipelines and providers.',notes:'Integration pitch'},
{id:'launchdarkly',name:'LaunchDarkly',cl:'C4: Infra',prio:'warm',wk:'W3',tch:'Email',angle:'Multi-model A/B testing',targets:'CTO, VP Product, Head of AI/ML',signal:'AI experimentation equals multi-model testing. They toggle features.',msg:'You toggle features. We toggle models. A/B test GPT-5 vs Opus with guardrails.',notes:'Synergy play'},
{id:'sentry',name:'Sentry',cl:'C4: Infra',prio:'warm',wk:'W3',tch:'Email',angle:'PII Shield for AI debugging',targets:'CTO, VP Product, Head of AI',signal:'Error traces contain PII/tokens. Sending to LLMs equals leak risk.',msg:'Error traces have secrets. When AI debugging hits an LLM that data goes. OrcaRouter PII Shield protects it.',notes:'Clean fit'},
{id:'figma',name:'Figma',cl:'C2: Enterprise AI',prio:'warm',wk:'W3',tch:'LinkedIn to Email',angle:'Cost routing for design-to-code',targets:'CTO, VP Eng, Head of AI',signal:'Design-to-code equals expensive compute. AI features on frontier models.',msg:'Route simple gen tasks to cheaper models keep frontier for complex. Half the inference bill.',notes:'IP protection is secondary'},
{id:'benchling',name:'Benchling',cl:'C3: Regulated',prio:'warm',wk:'W3',tch:'Email to LinkedIn',angle:'PHI on top of Anthropic partnership',targets:'VP Product, CTO, Head of AI',signal:'Anthropic partnership (Claude for Life Sciences). Very regulated.',msg:'Anthropic gives the model. Who handles governance for multi-lab workflows? OrcaRouter adds PII Shield.',notes:'Complement Anthropic'},
{id:'plaid',name:'Plaid',cl:'C3: Regulated',prio:'warm',wk:'W3',tch:'Email',angle:'Financial data in LLM prompts',targets:'CTO, VP Product, Head of AI',signal:'Financial data in LLM prompts. Finance-grade compliance.',msg:'Financial data in prompts equals leak risk. OrcaRouter PII Shield redacts sensitive data in real-time.',notes:'Finance-grade compliance'},
{id:'cockroach',name:'Cockroach Labs',cl:'C4: Infra',prio:'cold',wk:'W4',tch:'Email',angle:'Tool-call for AI SQL',targets:'CTO, VP Product',signal:'AI SQL generation equals tool-call security needed.',msg:'AI SQL is powerful until a hallucinated DROP TABLE. OrcaRouter firewall reviews every query.',notes:'Low priority'},
{id:'twilio',name:'Twilio Segment',cl:'C4: Infra',prio:'cold',wk:'W4',tch:'Email',angle:'Enterprise guardrails for CDP',targets:'VP Product, CTO',signal:'CDP data to LLM equals PII risk. Large enterprise customer base.',msg:'CDP data is full of PII. OrcaRouter PII Shield ensures that data never hits the model unredacted.',notes:'Low priority parent too large'}
];

var TK = 'orcaT';
var AK = 'orcaA';
var PK = 'orcaP';

function getT() {
  var raw = localStorage.getItem(TK);
  var t = [];
  try { t = JSON.parse(raw) || []; } catch(e) { t = []; }
  if (!t || t.length === 0 || !t[0] || !t[0].id) {
    t = [];
    for (var i = 0; i < DATA.length; i++) {
      t.push({ id: DATA[i].id, name: DATA[i].name, status: 'todo', lastTouch: '', contactName: '', contactTitle: '', linkedinUrl: '', pitchUsed: '', pitchCategory: '', assignedTo: '', notes: '' });
    }
    localStorage.setItem(TK, JSON.stringify(t));
  }
  return t;
}

function st(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

function upd(id, f, v) {
  var t = getT();
  for (var i = 0; i < t.length; i++) {
    if (t[i].id === id) { t[i][f] = v; st(TK, t); break; }
  }
}

function switchTab(id) {
  var btns = document.querySelectorAll('.controls button');
  for (var i = 0; i < btns.length; i++) btns[i].className = '';
  var secs = document.querySelectorAll('.section');
  for (var j = 0; j < secs.length; j++) secs[j].className = 'section';
  document.querySelector('.controls button:nth-child(' + (['accounts','tracker','actions','prospects','messaging'].indexOf(id)+1) + ')').className = 'active';
  document.getElementById('tab-' + id).className = 'section active';
  if (id === 'accounts') renderAccounts();
  if (id === 'tracker') renderTracker();
  if (id === 'actions') renderActions();
  if (id === 'prospects') renderProspects();
  if (id === 'messaging') document.getElementById('messagingRoot').innerHTML = '<p style="color:var(--muted)">Messaging assistant coming soon</p>';
}

function renderAccounts() {
  var t = getT();
  var h = '';
  for (var i = 0; i < t.length; i++) {
    var x = t[i];
    var d = null;
    for (var j = 0; j < DATA.length; j++) { if (DATA[j].id === x.id) { d = DATA[j]; break; } }
    if (!d) d = { name: x.name, cl: 'Prospect', prio: 'warm', wk: 'New', tch: 'Manual', angle: 'Prospect', targets: '', signal: '', msg: '', notes: '' };
    var tc = d.prio === 'hot' ? 'tag-hot' : (d.prio === 'warm' ? 'tag-warm' : 'tag-cold');
    var th = '';
    var ts = d.tch.split('+');
    for (var k = 0; k < ts.length; k++) th += '<span style="background:var(--surface2);padding:1px 6px;border-radius:4px;font-size:10px">' + ts[k] + '</span>';
    var tar = d.targets.split(', ');
    var tah = '';
    for (var m = 0; m < tar.length; m++) tah += '<li>' + tar[m] + '</li>';
    var sig = d.signal.split('. ');
    var sih = '';
    for (var n = 0; n < sig.length; n++) { if (sig[n].trim()) sih += '<li>' + sig[n] + '</li>'; }
    h += '<div class="acct-row" onclick="this.classList.toggle(\'open\')">';
    h += '<div class="left"><div class="acct-name">' + d.name + ' <span class="acct-cluster">' + d.cl + '</span></div><div class="acct-angle">' + d.angle + '</div></div>';
    h += '<div><span class="acct-tag ' + tc + '">' + d.prio.toUpperCase() + '</span></div><div style="font-size:12px;color:var(--muted)">' + d.wk + '</div>';
    h += '<div style="font-size:11px;display:flex;flex-wrap:wrap;gap:3px">' + th + '</div>';
    h += '<div class="acct-detail"><div class="detail-grid"><div class="detail-card"><h4>Targets</h4><ul>' + tah + '</ul></div>';
    h += '<div class="detail-card"><h4>Signal</h4><ul>' + sih + '</ul></div>';
    h += '<div class="detail-card" style="grid-column:1/-1"><h4>Message</h4><p>' + d.msg + '</p></div>';
    h += '<div class="detail-card" style="grid-column:1/-1"><h4>Notes</h4><p>' + d.notes + '</p></div></div></div></div>';
  }
  document.getElementById('accountsRoot').innerHTML = h;
}

function renderTracker() {
  var t = getT();
  var opts = ['todo','emailed','called','meeting-scheduled','meeting-done','declined','closed'];
  var h = '';
  for (var i = 0; i < t.length; i++) {
    var x = t[i];
    var d = null;
    for (var j = 0; j < DATA.length; j++) { if (DATA[j].id === x.id) { d = DATA[j]; break; } }
    var pr = d ? d.prio : 'warm';
    var tc = pr === 'hot' ? 'tag-hot' : (pr === 'warm' ? 'tag-warm' : 'tag-cold');
    var so = '';
    for (var k = 0; k < opts.length; k++) so += '<option value="' + opts[k] + '"' + (x.status === opts[k] ? ' selected' : '') + '>' + opts[k].replace(/-/g,' ') + '</option>';
    var an = d ? d.angle : 'Prospect';
    var wk = d ? d.wk : 'New';
    var ids = x.id.replace(/'/g, "\\'");
    h += '<div class="trk-card"><h4>' + x.name + ' <span class="acct-tag ' + tc + '" style="font-size:9px;padding:1px 6px">' + pr.toUpperCase() + '</span></h4>';
    h += '<div class="meta">' + an + ' - ' + wk + '</div>';
    h += '<div class="field-group"><label>Status</label><select onchange="upd(\'' + ids + '\',\'status\',this.value)">' + so + '</select></div>';
    h += '<div class="row2"><div class="field-group"><label>Contact</label><input value="' + (x.contactName||'') + '" onchange="upd(\'' + ids + '\',\'contactName\',this.value)"></div>';
    h += '<div class="field-group"><label>Title</label><input value="' + (x.contactTitle||'') + '" onchange="upd(\'' + ids + '\',\'contactTitle\',this.value)"></div></div>';
    h += '<div class="field-group"><label>LinkedIn</label><input value="' + (x.linkedinUrl||'') + '" onchange="upd(\'' + ids + '\',\'linkedinUrl\',this.value)"></div>';
    h += '<div class="field-group"><label>Notes</label><textarea onchange="upd(\'' + ids + '\',\'notes\',this.value)">' + (x.notes||'') + '</textarea></div></div>';
  }
  document.getElementById('trackerRoot').innerHTML = h;
}

function getActs() {
  var r = localStorage.getItem(AK);
  try { return JSON.parse(r) || []; } catch(e) { return []; }
}

function renderActions() {
  var t = getT();
  var h = '<table class="actions-table"><thead><tr><th>Account</th><th>Status</th><th>AE</th></tr></thead><tbody>';
  for (var i = 0; i < t.length; i++) {
    var tr = t[i];
    var d = null;
    for (var j = 0; j < DATA.length; j++) { if (DATA[j].id === tr.id) { d = DATA[j]; break; } }
    var nm = d ? d.name : tr.name;
    var ids = tr.id.replace(/'/g, "\\'");
    h += '<tr><td>' + nm + '</td><td><span class="status-dot ' + (tr.status||'todo') + '"></span>' + (tr.status||'todo').replace(/-/g,' ') + '</td><td>' + (tr.assignedTo||'-') + '</td></tr>';
  }
  h += '</tbody></table>';
  document.getElementById('actionsRoot').innerHTML = h;
}

function getProsp() {
  var r = localStorage.getItem(PK);
  try { return JSON.parse(r) || []; } catch(e) { return []; }
}

function renderProspects() {
  var p = getProsp();
  if (p.length === 0) { document.getElementById('prospectsRoot').innerHTML = '<p style="color:var(--muted);font-size:13px">No prospects yet.</p>'; return; }
  var h = '';
  for (var i = 0; i < p.length; i++) {
    h += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:8px">';
    h += '<div style="font-weight:600">' + p[i].company + '</div>';
    h += '<div style="font-size:12px;color:var(--muted)">' + (p[i].detail||'') + '</div></div>';
  }
  document.getElementById('prospectsRoot').innerHTML = h;
}

renderAccounts();
renderTracker();
renderActions();
renderProspects();
</script>
</body>
</html>
